<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Careers - TechEdge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-root"></div>
  <section class="py-5">
    <div class="container">
      <h1 class="mb-3">Careers</h1>
      <p class="text-muted">Join our network of expert instructors and support staff.</p>
      <div class="row g-4 mt-1">
        <div class="col-12 col-lg-6" data-aos="fade-right">
          <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216?q=80&w=1400&auto=format&fit=crop" alt="Careers" class="img-fluid rounded-4 shadow-soft">
        </div>
        <div class="col-12 col-lg-6" data-aos="fade-left">
          <form class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" required>
            </div>
            <div class="col-12">
              <label class="form-label">Role</label>
              <select class="form-select">
                <option>Instructor</option>
                <option>Program Manager</option>
                <option>Sales</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="3"></textarea>
            </div>
            <div class="col-12">
              <button class="btn btn-primary" type="submit">Apply</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>
  <div id="footer-root"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
