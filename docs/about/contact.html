<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us - TechEdge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-root"></div>
  <section class="py-5">
    <div class="container">
      <h1 class="mb-3">Contact Us</h1>
      <p class="text-muted">Have a question? Send us a message and we’ll get back within 1 business day.</p>
      <div class="row g-4 mt-1">
        <div class="col-12 col-lg-6" data-aos="fade-right">
          <form class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" required>
            </div>
            <div class="col-12">
              <label class="form-label">Subject</label>
              <input type="text" class="form-control">
            </div>
            <div class="col-12">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="4"></textarea>
            </div>
            <div class="col-12">
              <button class="btn btn-primary" type="submit">Send</button>
            </div>
          </form>
        </div>
        <div class="col-12 col-lg-6" data-aos="fade-left">
          <div class="p-4 border rounded-4 h-100">
            <h5>Office</h5>
            <p>123 Tech Park, Innovation Street, City, Country</p>
            <h6>Email</h6>
            <p>hello@techedge.example</p>
            <h6>Phone</h6>
            <p>+1 (555) 123-4567</p>
          </div>
        </div>
      </div>
    </div>
  </section>
  <div id="footer-root"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
