<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Course - TechEdge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-root"></div>

  <section class="course-hero">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Trainings</a></li>
          <li id="crumb-course" class="breadcrumb-item active" aria-current="page">Course</li>
        </ol>
      </nav>
      <h1 id="course-title" class="mb-2">Course</h1>
      <p id="course-summary" class="text-muted"></p>
    </div>
  </section>

  <section class="py-4">
    <div class="container">
      <div class="row g-4">
        <div class="col-12 col-lg-8">
          <img id="course-image" src="" alt="Course" class="img-fluid rounded-4 shadow-soft mb-4">
          <h4>What you'll learn</h4>
          <ul id="course-topics" class="mb-4"></ul>
          <h4>Who this course is for</h4>
          <p id="course-audience" class="mb-4"></p>
        </div>
        <div class="col-12 col-lg-4">
          <div class="border rounded-4 p-3 shadow-soft">
            <h5 class="mb-3">Enroll now</h5>
            <ul class="list-unstyled small text-muted">
              <li>Mode: Online / Corporate</li>
              <li>Duration: 4-8 weeks</li>
              <li>Hands-on labs included</li>
            </ul>
            <a class="btn btn-primary w-100 mb-2" href="../payments.html">Proceed to Payment</a>
            <a class="btn btn-outline-secondary w-100" href="../about/contact.html">Contact Us</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    async function loadCourse() {
      const params = new URLSearchParams(location.search);
      const slug = params.get('slug');
      const res = await fetch('../assets/data/trainings.json');
      const data = await res.json();

      const all = Object.values(data).flat();
      const course = all.find(c => c.slug === slug) || all[0];

      document.getElementById('crumb-course').textContent = course.title;
      document.getElementById('course-title').textContent = course.title;
      document.getElementById('course-summary').textContent = course.summary;
      document.getElementById('course-image').src = course.image;
      document.getElementById('course-audience').textContent = course.audience;

      const topics = document.getElementById('course-topics');
      topics.innerHTML = '';
      course.topics.slice(0, 8).forEach(t => {
        const li = document.createElement('li');
        li.textContent = t;
        topics.appendChild(li);
      });
    }
    loadCourse();
  </script>
</body>
</html>
