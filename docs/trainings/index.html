<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trainings Catalog - TechEdge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-root"></div>
  <section class="py-5">
    <div class="container">
      <h1 class="mb-4">All Trainings</h1>
      <p class="text-muted">Browse 1-page course overviews. Click any course to view details.</p>

      <div id="catalog" class="row g-4"></div>
    </div>
  </section>

  <div id="footer-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  async function loadCatalog() {
    const res = await fetch('../assets/data/trainings.json');
    const data = await res.json();
    const container = document.getElementById('catalog');

    const categories = Object.keys(data);
    let delay = 0;

    for (const category of categories) {
      const courses = data[category];
      const section = document.createElement('div');
      section.className = 'col-12';
      section.id = category.toLowerCase().replace(/\s+/g, '-');
      section.innerHTML = `<h3 class="mt-4" id="${category.toLowerCase()}">${category}</h3>`;
      container.appendChild(section);

      courses.forEach(course => {
        const col = document.createElement('div');
        col.className = 'col-12 col-md-6 col-lg-4';
        col.setAttribute('data-aos', 'fade-up');
        col.setAttribute('data-aos-delay', String(delay));
        delay = (delay + 50) % 250;
        col.innerHTML = `
          <div class="card h-100 card-hover">
            <img src="${course.image}" class="card-img-top" alt="${course.title}">
            <div class="card-body">
              <span class="badge text-bg-light mb-2">${category}</span>
              <h5 class="card-title">${course.title}</h5>
              <p class="card-text">${course.summary}</p>
              <a class="stretched-link" href="course.html?slug=${encodeURIComponent(course.slug)}">View course</a>
            </div>
          </div>`;
        container.appendChild(col);
      });
    }
  }
  loadCatalog();
  </script>
</body>
</html>
